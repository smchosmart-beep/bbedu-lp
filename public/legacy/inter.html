<!doctype html>
<html lang="ko" class="h-full">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>질문이 있는 교수·학습 과정안 도우미</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Arial','Helvetica','sans-serif'] },
        colors: {
          brand: {
            50:  '#c0d5e6', 100: '#acace7', 200: '#9fbee7', 300: '#8ba1d4',
            400: '#ecab37', 500: '#f68d1f', 600: '#e48600', 700: '#e60012',
          },
        },
        boxShadow: { card: '0 0 0 1px #3d4f97, inset 0 1px 0 rgba(255,255,255,.5)' }
      }
    }
  }
</script>
<link rel="stylesheet" href="./styles.css?v=65">
</head>
<body class="h-full flex flex-col font-sans">

<!-- 헤더 -->
<header class="nn-nav flex-none z-10">
  <div class="px-5 py-3.5 flex items-center gap-3">
    <img src="logo.png?v=1" alt="서울특별시북부교육지원청" class="w-10 h-10 flex-none object-contain nn-logo-frame">
    <div class="nn-title-block">
      <h1 class="nn-logo-pill">질문이 있는 <span class="nn-logo-accent">교수·학습 과정안</span> 도우미</h1>
    </div>

    <button id="adminBtn" class="nn-chip ml-auto flex-none">🔒 관리자</button>
    <button id="resetBtn" class="nn-chip ml-auto flex-none hidden">↺ 새로 시작</button>
  </div>
  <div id="progress" class="nn-subnav px-5">
    <div class="flex items-center gap-1.5"></div>
  </div>
</header>

<!-- 본문 -->
<div class="flex flex-1 overflow-hidden gap-4 px-5 pb-5 pt-1">

  <!-- ── 시작 화면: 기본 정보 입력 ── -->
  <div id="welcome" class="flex-1 flex overflow-y-auto">
    <div class="m-auto w-full max-w-lg px-4 py-6 text-center">
      <div class="relative mx-auto mb-4 w-16 h-16">
        <div class="nn-hero-badge grid place-items-center">
          <span class="text-white text-3xl font-extrabold leading-none">?</span>
        </div>
        <span class="absolute -right-4 -top-4 text-3xl select-none" style="color:var(--amber);text-shadow:1px 1px 0 rgba(0,0,0,.35);">✦</span>
      </div>
      <h2 class="nn-hero-word text-xl">어떤 수업을 함께 설계해 볼까요?</h2>
      <p class="nn-hero-tagline mt-2 mb-6">먼저 기본 정보를 입력해 주세요. 이후 챗봇이 안내합니다.</p>
      <form id="startForm" class="nn-panel nn-chamfer p-5 text-left space-y-3.5">
        <div class="grid grid-cols-3 gap-2">
          <div>
            <label class="sf-label" for="sfGrade">학년</label>
            <select id="sfGrade" class="sf-field">
              <option>1학년</option><option>2학년</option><option selected>3학년</option>
              <option>4학년</option><option>5학년</option><option>6학년</option>
            </select>
          </div>
          <div>
            <label class="sf-label" for="sfSemester">학기</label>
            <select id="sfSemester" class="sf-field">
              <option>1학기</option><option selected>2학기</option>
            </select>
          </div>
          <div>
            <label class="sf-label" for="sfSubject">교과</label>
            <select id="sfSubject" class="sf-field">
              <option>국어</option><option>도덕</option><option>사회</option><option>수학</option>
              <option>과학</option><option>체육</option><option>음악</option><option>미술</option><option>영어</option>
            </select>
          </div>
        </div>
        <div>
          <label class="sf-label" for="sfPublisher">교과서(출판사)</label>
          <select id="sfPublisher" class="sf-field"></select>
        </div>
        <div>
          <label class="sf-label" for="sfUnitSel">단원</label>
          <select id="sfUnitSel" class="sf-field"></select>
          <input id="sfUnit" type="text" class="sf-field mt-2 hidden" placeholder="단원명 직접 입력 (예: 프로젝트 단원)">
        </div>
        <div>
          <label class="sf-label" for="sfTopic">수업 주제 · 아이디어 <span class="font-normal text-slate-400">(자유롭게 — 이번 차시 내용, 강조점, 수업 의도 등)</span></label>
          <textarea id="sfTopic" class="sf-field" rows="4" placeholder="예) 자석에 붙는 물체와 붙지 않는 물체를 직접 분류해 보게 하고 싶어요. 일상에서 자석이 쓰이는 예와 연결하고, 모둠 탐구 활동 중심으로 진행하면 좋겠어요. (한 줄로 주제만 적으셔도 됩니다)" required></textarea>
        </div>
        <button type="submit" class="sf-submit">이 수업 설계 시작하기 →</button>
      </form>
    </div>
  </div>

  <!-- ── 작업 공간: 시작 후 좌우 분할 ── -->
  <div id="workspace" class="hidden flex-1 flex gap-4 min-w-0 overflow-hidden">

  <!-- ── 좌측: 채팅 패널 ── -->
  <div class="nn-panel nn-chamfer flex flex-col w-[46%] min-w-0 overflow-hidden">

    <!-- 채팅 메시지 영역 -->
    <main id="chat" class="flex-1 overflow-y-auto px-5 py-5 space-y-4"></main>

    <!-- 입력 컴포저 -->
    <div id="composer" class="flex-none px-4 pb-4">
      <div id="quickArea" class="mb-2"></div>
      <div class="nn-composer flex items-end gap-2 px-3 py-2">
        <textarea id="input" rows="1" placeholder="답변을 입력하세요"
          class="flex-1 resize-none bg-transparent px-1 py-1.5 text-sm focus:outline-none placeholder:text-slate-400"></textarea>
        <button id="sendBtn" class="nn-btn-submit flex-none">보내기</button>
      </div>
      <p class="nn-fineprint mt-2 px-2">생성된 내용은 검토 후 사용하세요. 생성된 교수학습과정안의 저작권은 사용자에게 있습니다.</p>
    </div>
  </div>

  <!-- ── 우측: 과정안 미리보기 패널 ── -->
  <div class="flex flex-col flex-1 min-w-0">

    <!-- 미리보기 카드 -->
    <div class="nn-panel nn-chamfer flex flex-col flex-1 min-h-0 overflow-hidden">
      <div class="nn-panel-header flex-none flex items-center justify-between gap-2 px-5 py-2.5">
        <span class="nn-panel-title">📄 미리보기 및 직접 수정 <span class="nn-panel-sub">(칸을 눌러 고칠 수 있어요)</span></span>
        <div class="flex-none flex items-center gap-1.5">
          <button id="reviewBtn" class="nn-btn-primary">🔎 검증</button>
          <button id="dlBtn" class="nn-btn-submit">⬇ HWPX 다운로드</button>
        </div>
      </div>
      <div id="planPreview" class="flex-1 overflow-y-auto px-4 py-4">
        <!-- app.js에서 동적으로 채워짐 -->
      </div>
    </div>

  </div>
  </div><!-- /workspace -->
</div>

<footer class="nn-footer flex-none">
  <span class="nn-footer-accent">◆</span>2026 서울특별시북부교육지원청
</footer>



<script src="./app.js?v=186"></script>
</body>
</html>
